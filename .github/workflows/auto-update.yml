name: Auto Update Wallos

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

# GLOBALER ENV-BLOCK (Schaltet die Node.js Warnung aus)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    name: Check for Wallos updates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Get current Wallos version from Dockerfile
        id: current
        run: |
          CURRENT_VERSION=$(grep -E '^ARG WALLOS_VERSION=' wallos/Dockerfile | sed 's/ARG WALLOS_VERSION=//')
          echo "current_version=${CURRENT_VERSION}" >> $GITHUB_OUTPUT

      - name: Fetch latest release from Wallos repository
        id: latest
        run: |
          RESPONSE=$(curl -s https://api.github.com/repos/ellite/Wallos/releases/latest)
          LATEST_VERSION=$(echo "$RESPONSE" | jq -r '.tag_name')
          
          if [ "$LATEST_VERSION" = "null" ] || [ -z "$LATEST_VERSION" ]; then
            echo "Fehler: API-Abfrage fehlgeschlagen."
            exit 1
          fi
          
          echo "latest_version=${LATEST_VERSION}" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: compare
        run: |
          CURRENT="${{ steps.current.outputs.current_version }}"
          LATEST="${{ steps.latest.outputs.latest_version }}"
          
          if [ "$CURRENT" = "$LATEST" ]; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
          fi

      - name: Update files with new Wallos version
        if: steps.compare.outputs.up_to_date == 'false'
        run: |
          LATEST="${{ steps.latest.outputs.latest_version }}"
          sed -i "s/^ARG WALLOS_VERSION=.*/ARG WALLOS_VERSION=${LATEST}/" wallos/Dockerfile
          PLAIN_VERSION=$(echo $LATEST | sed 's/^v//')
          sed -i "s/^version: .*/version: \"${PLAIN_VERSION}\"/" wallos/config.yaml

      - name: Create Pull Request
        # Wir geben diesem Schritt eine ID, um die PR-Nummer später abzugreifen
        id: cpr
        if: steps.compare.outputs.up_to_date == 'false'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Wallos to ${{ steps.latest.outputs.latest_version }}'
          title: 'Update Wallos to ${{ steps.latest.outputs.latest_version }}'
          body: |
            ## 📦 Automatisches Update auf ${{ steps.latest.outputs.latest_version }}
            Dieses PR wurde automatisch erstellt und wird (falls konfiguriert) direkt gemergt.
          branch: 'auto-update-wallos-${{ steps.latest.outputs.latest_version }}'
          delete-branch: true

      - name: Auto-Merge Pull Request
        # Dieser Schritt führt den Merge automatisch aus
        if: steps.compare.outputs.up_to_date == 'false' && steps.cpr.outputs.pull-request-number
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --merge --delete-branch
