name: Build Wallos HA Add-on

# Build workflow - triggered on changes to wallos/ directory
on:
  push:
    branches:
      - main
    paths:
      - 'wallos/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Wöchentliches Rebuild jeden Sonntag um 3:00 UTC
    - cron: '0 3 * * 0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wallos-ha
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Get version from config.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' wallos/config.yaml | sed 's/version: *//' | tr -d '"')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.arch }}
    needs: prepare
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            base_image: ghcr.io/home-assistant/aarch64-base:3.19
            platform: linux/arm64
          - arch: amd64
            base_image: ghcr.io/home-assistant/amd64-base:3.19
            platform: linux/amd64
          - arch: armhf
            base_image: ghcr.io/home-assistant/armhf-base:3.19
            platform: linux/arm/v6
          - arch: armv7
            base_image: ghcr.io/home-assistant/armv7-base:3.19
            platform: linux/arm/v7
          - arch: i386
            base_image: ghcr.io/home-assistant/i386-base:3.19
            platform: linux/386

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.prepare.outputs.version }}



      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./wallos
          file: ./wallos/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=${{ matrix.base_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
