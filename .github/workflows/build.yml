name: Build Wallos HA Add-on

on:
  push:
    branches:
      - main
    paths:
      - 'wallos/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Wöchentliches Rebuild jeden Sonntag um 3:00 UTC
    - cron: '0 3 * * 0'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/wallos-ha
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            base_image: ghcr.io/home-assistant/aarch64-base:3.19
            platform: linux/arm64
          - arch: amd64
            base_image: ghcr.io/home-assistant/amd64-base:3.19
            platform: linux/amd64
          - arch: armhf
            base_image: ghcr.io/home-assistant/armhf-base:3.19
            platform: linux/arm/v6
          - arch: armv7
            base_image: ghcr.io/home-assistant/armv7-base:3.19
            platform: linux/arm/v7
          - arch: i386
            base_image: ghcr.io/home-assistant/i386-base:3.19
            platform: linux/386

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.arch }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./wallos
          file: ./wallos/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_FROM=${{ matrix.base_image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifest:
    name: Update Add-on Manifest
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version in config.json
        run: |
          VERSION=$(date +'%Y.%m.%d')
          jq --arg version "$VERSION" '.version = $version' wallos/config.json > wallos/config.json.tmp
          mv wallos/config.json.tmp wallos/config.json

      - name: Commit version update
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add wallos/config.json
          git diff --staged --quiet || git commit -m "Update version to $(date +'%Y.%m.%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
